# Base server settings. bootstrap.sh appends server-port + RCON settings (with
# the secret) at boot, so those are intentionally NOT here.
motd=Minecraft Arsenal — All the Mods 11
difficulty=normal
gamemode=survival
max-players=10
view-distance=10
simulation-distance=8
# Whitelist OFF: anyone can join (the port is public). This is intentional for
# this server — we don't care about restricting players. Flip both to true and
# use `/whitelist add <name>` via RCON/console if you ever want to lock it down.
white-list=false
enforce-whitelist=false
spawn-protection=0
online-mode=true
allow-flight=true

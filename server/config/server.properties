# Base server settings. bootstrap.sh appends server-port + RCON settings (with
# the secret) at boot, so those are intentionally NOT here.
motd=Minecraft Arsenal — All the Mods 11
difficulty=normal
gamemode=survival
max-players=10
view-distance=10
simulation-distance=8
# Turn on and manage the allow-list to control who can join (the port is public).
white-list=true
enforce-whitelist=true
spawn-protection=0
online-mode=true
allow-flight=true
